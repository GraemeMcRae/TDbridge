; /etc/stunnel/tdbridge.conf
;
; TDbridge TLS terminator.
; Accepts HTTPS connections on the public ports, terminates TLS using the full
; Let's Encrypt certificate chain, and forwards plain HTTP to the bot processes
; on localhost.
;
; IMPORTANT: cert must be fullchain.pem (leaf + intermediates). Presenting only
; the leaf certificate causes clients (notably Telegram) to reject the
; connection with TLSV1_ALERT_UNKNOWN_CA.
;
; Port map:
;   Webhook  test : external 88   -> internal 8088   (dormant while polling)
;   Webhook  prod : external 8443 -> internal 8444   (dormant while polling)
;   Gateway  test : external 8089 -> internal 8090
;   Gateway  prod : external 8445 -> internal 8446
;
; After editing this file: sudo systemctl restart stunnel4

pid = /var/run/stunnel4/stunnel.pid

cert = /etc/letsencrypt/live/hcf.squadrontrucking.com/fullchain.pem
key  = /etc/letsencrypt/live/hcf.squadrontrucking.com/privkey.pem

; ----- Telegram webhook tunnels (retained; dormant while polling) -----
[tdbridge-webhook-test]
accept  = 88
connect = 127.0.0.1:8088

[tdbridge-webhook-prod]
accept  = 8443
connect = 127.0.0.1:8444

; ----- Gateway tunnels -----
[tdbridge-gateway-test]
accept  = 8089
connect = 127.0.0.1:8090

[tdbridge-gateway-prod]
accept  = 8445
connect = 127.0.0.1:8446
